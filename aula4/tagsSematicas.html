<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="tagsSemanticas.css">
    <title>Tag Semântica</title>
</head>
<body>
    <header>
        <h1>TAG HEADER - Cabeçalho superior</h1>
    </header>

    <main>

        <section id="lado_esquerdo">
            <nav>
                <h2>Navegação</h2>
            </nav>

            <aside>
                <p>Publicidade</p>
            </aside>
        </section>

        <section id="lado_direito">
            <article>
                <header>
                    <h1>Título do Article</h1>
                </header>

                <div class="area-texto">
                    <p>Área para texto</p>
                </div>

                <div class="area-imagem">
                    <span>Área para imagem</span>
                    
                </div>
            </article>
        </section>

    </main>

</body>
</html>
